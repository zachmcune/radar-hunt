<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f14">
  <title>Radar Hunt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <h1 class="title">Radar Hunt</h1>
      <p class="subtitle" id="subtitle">Scanning the area…</p>
    </header>

    <main class="radar-stage">
      <div class="radar" id="radar" aria-hidden="true">
        <div class="radar-grid"></div>
        <div class="radar-rings">
          <span class="ring"></span>
          <span class="ring"></span>
          <span class="ring"></span>
          <span class="ring"></span>
        </div>
        <div class="arena-boundary" id="arena-boundary" hidden></div>
        <div class="radar-crosshair"></div>
        <div class="radar-sweep" id="radar-sweep"></div>
        <div class="radar-center" id="radar-center"></div>
        <div class="player-dot" id="player-dot" hidden></div>
        <div class="blips" id="blips"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Active scan</span>
      </div>

      <div class="arena-warning" id="arena-warning" hidden aria-live="assertive"></div>

      <div class="round-controls" id="round-controls" hidden>
        <button type="button" class="round-btn" id="end-round">End round</button>
      </div>

      <section class="arena-panel" id="arena-panel">
        <div class="arena-modes" role="tablist" aria-label="Arena mode">
          <button type="button" id="mode-host" class="arena-mode is-active" role="tab" aria-selected="true">
            Host
          </button>
          <button type="button" id="mode-join" class="arena-mode" role="tab" aria-selected="false">
            Join
          </button>
        </div>

        <div id="host-setup" class="arena-setup">
          <label class="arena-radius-label" for="arena-radius">
            Arena radius
            <span class="arena-radius-value" id="arena-radius-value">100 m</span>
          </label>
          <input
            type="range"
            id="arena-radius"
            class="arena-radius-input"
            min="25"
            max="500"
            step="5"
            value="100"
          >
          <button type="button" class="arena-action" id="arena-create">
            Create arena at my location
          </button>
          <div class="arena-share" id="host-share" hidden>
            <p class="arena-share-label">Lobby code — share with players</p>
            <div class="lobby-code" id="lobby-code" aria-live="polite">----</div>
            <button type="button" class="arena-action arena-copy-code" id="arena-copy-code">
              Copy lobby code
            </button>
          </div>
        </div>

        <div id="join-setup" class="arena-setup" hidden>
          <p class="arena-hint">Enter the lobby code from your host.</p>
          <label class="arena-radius-label" for="lobby-code-input">Lobby code</label>
          <input
            type="text"
            id="lobby-code-input"
            class="lobby-code-input"
            placeholder="e.g. ABCD-EFGH-IJKL"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            enterkeyhint="go"
          >
          <button type="button" class="arena-action" id="arena-join">
            Join arena &amp; enable GPS
          </button>
        </div>
      </section>

      <section class="geo-panel" id="geo-panel" aria-live="polite">
        <button class="geo-enable" id="geo-enable" type="button">
          Enable GPS
        </button>

        <dl class="geo-data" id="geo-data" hidden>
          <div class="geo-row">
            <dt>Latitude</dt>
            <dd id="geo-lat">—</dd>
          </div>
          <div class="geo-row">
            <dt>Longitude</dt>
            <dd id="geo-lng">—</dd>
          </div>
          <div class="geo-row">
            <dt>Accuracy</dt>
            <dd id="geo-accuracy">—</dd>
          </div>
          <div class="geo-row arena-only" id="row-distance" hidden>
            <dt>Distance</dt>
            <dd id="arena-distance">—</dd>
          </div>
          <div class="geo-row arena-only" id="row-radius" hidden>
            <dt>Arena radius</dt>
            <dd id="arena-radius-display">—</dd>
          </div>
        </dl>

        <p class="geo-message" id="geo-message" hidden></p>
      </section>

      <p class="hint">Move your device to explore</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
